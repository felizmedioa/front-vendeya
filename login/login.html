<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soluciones Colibrí - Acceso</title>
    <script>if(localStorage.theme==='dark'||(!('theme' in localStorage)&&window.matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.classList.add('dark')}</script>
    <!-- Tailwind CSS desde el CDN para estilo sin configuración extra -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuentes de Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        mainBgTop: '#f8fafc',
                        mainBgBottom: '#f1f5f9',
                        brandPrimary: '#f97316',
                        brandPrimaryHover: '#ea580c',
                        brandGray: '#334155',
                        sidebarBg: '#0f172a', /* Deep Slate 900 */
                        sidebarHover: '#1e293b', /* Slate 800 */
                        brandGrayOutline: '#475569',
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-gradient-to-b from-mainBgTop to-mainBgBottom dark:from-slate-900 dark:to-slate-800 min-h-screen flex flex-col m-0 p-0 relative font-sans text-gray-800 dark:text-slate-50">

    <!-- Navegación Superior -->
    <nav
        class="bg-white dark:bg-slate-800 px-8 py-4 flex justify-between items-center w-full shadow-[0_2px_10px_rgba(0,0,0,0.05)] relative z-10">
        <!-- Lado Izquierdo: Logo y Título -->
        <a href="#" class="flex items-center gap-3 transition-opacity hover:opacity-80">
            <!-- Icono Colibrí (SVG Aproximado) -->
            <svg class="h-9 w-12" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Ala (Turquesa / Arriba) -->
                <path d="M45 55 L35 15 L60 40 Z" fill="#fdba74" />
                <path d="M45 55 L15 35 L60 40 Z" fill="#f97316" />
                <!-- Cabeza y pico (Coral) -->
                <path d="M60 40 L85 30 L65 50 Z" fill="#4b5563" />
                <!-- Cuerpo (Gris/Azul oscuro) -->
                <path d="M35 70 L60 40 L65 50 L45 80 Z" fill="#1f2937" />
                <!-- Cola -->
                <path d="M45 80 L25 90 L35 70 Z" fill="#3A4D61" />
            </svg>
            <span class="text-[22px] font-normal tracking-tight text-gray-900 dark:text-slate-50 mt-1">Soluciones Colibrí</span>
        </a>

        <!-- Lado Derecho: Enlaces y Botón -->
        <div class="hidden md:flex items-center gap-7 text-[15px] font-medium mt-1">
            <a href="#" class="text-sidebarBg hover:text-gray-900 dark:text-slate-50 transition-colors">
                Inicio
            </a>
            <a href="#" class="text-sidebarBg hover:text-gray-900 dark:text-slate-50 transition-colors">
                Precios
            </a>
            <a href="#" class="text-sidebarBg hover:text-gray-900 dark:text-slate-50 transition-colors">
                Contacto
            </a>
            <a href="#"
                class="border border-brandGrayOutline text-brandGrayOutline px-[18px] py-[6px] rounded uppercase font-medium text-xs tracking-wider hover:bg-brandGrayOutline hover:text-white transition-colors ml-1">
                Registrarse
            </a>
        </div>
        <button id="btn-menu" class="md:hidden block text-gray-800 dark:text-slate-50">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                </path>
            </svg>
        </button>

        <!-- Menú móvil (oculto por defecto) -->
        <div id="mobile-menu"
            class="hidden md:hidden flex-col bg-white dark:bg-slate-800 absolute top-full left-0 w-full shadow-md z-20 border-t border-gray-100 dark:border-slate-700">
            <a href="#" class="p-4 border-b hover:bg-gray-50 dark:hover:bg-slate-700 dark:bg-slate-900 transition-colors text-sidebarBg">Inicio</a>
            <a href="#" class="p-4 border-b hover:bg-gray-50 dark:hover:bg-slate-700 dark:bg-slate-900 transition-colors text-sidebarBg">Precios</a>
            <a href="#" class="p-4 border-b hover:bg-gray-50 dark:hover:bg-slate-700 dark:bg-slate-900 transition-colors text-sidebarBg">Contacto</a>
            <a href="#" class="p-4 font-bold text-brandGrayOutline hover:bg-gray-50 dark:hover:bg-slate-700 dark:bg-slate-900 transition-colors">Registrarse</a>
        </div>

    </nav>

    <!-- Contenido Principal: Tarjeta de Login -->
    <main class="flex-1 flex items-center justify-center margin-left-10 margin-right-10">

        <div
            class="bg-white dark:bg-slate-800 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] w-full max-w-[400px] p-[2.3rem] flex flex-col items-center">
            <!-- Icono Colibrí en Centro -->
            <svg class="h-12 w-16 mb-4" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Ala (Turquesa / Arriba) -->
                <path d="M45 55 L35 15 L60 40 Z" fill="#fdba74" />
                <path d="M45 55 L15 35 L60 40 Z" fill="#f97316" />
                <!-- Cabeza y pico (Coral) -->
                <path d="M60 40 L85 30 L65 50 Z" fill="#4b5563" />
                <!-- Cuerpo (Gris/Azul oscuro) -->
                <path d="M35 70 L60 40 L65 50 L45 80 Z" fill="#1f2937" />
                <!-- Cola -->
                <path d="M45 80 L25 90 L35 70 Z" fill="#3A4D61" />
            </svg>

            <!-- Título -->
            <h1 class="text-[26px] font-normal text-gray-900 dark:text-slate-50 mb-6 uppercase tracking-wide">Acceso</h1>

            <!-- Formulario -->
            <form id="form" class="w-full space-y-[1.15rem]">
                <div>
                    <input type="text" placeholder="Usuario" id="usuario" required
                        class="w-full border border-gray-300 dark:border-slate-600 rounded-[5px] px-[18px] py-[10px] text-[15px] text-gray-700 dark:text-slate-200 bg-white dark:bg-slate-800 placeholder-gray-500 focus:outline-none focus:border-brandPrimary focus:ring-1 focus:ring-brandPrimary transition-shadow">
                </div>
                <div>
                    <input type="password" placeholder="Contraseña" id="password" required
                        class="w-full border border-gray-300 dark:border-slate-600 rounded-[5px] px-[18px] py-[10px] text-[15px] text-gray-700 dark:text-slate-200 bg-white dark:bg-slate-800 placeholder-gray-500 focus:outline-none focus:border-brandPrimary focus:ring-1 focus:ring-brandPrimary transition-shadow">
                </div>

                <button type="submit"
                    class="w-full mt-2 bg-brandGray hover:bg-brandGrayOutline text-white py-[11px] px-4 rounded-[5px] text-[15px] uppercase tracking-wide font-normal transition-colors shadow-sm">
                    Iniciar Sesión
                </button>
                <p id="error-message" class="text-red-500 text-sm hidden mt-2 text-center"></p>
            </form>

            <!-- Enlaces Pie de Tarjeta -->
            <div
                class="w-full flex justify-between items-center mt-[1.6rem] text-sidebarBg text-[15px] font-normal px-1">
                <a href="#" class="hover:underline opacity-95 transition-opacity">Olvidé mi contraseña</a>
                <a href="#" class="hover:underline opacity-95 transition-opacity">Crear cuenta</a>
            </div>
        </div>

    </main>
    <script src="js/toggleMenu.js"></script>
    <script type="module" src="js/validToken.js"></script>
    <script type="module" src="js/getForms.js"></script>
    <script src="../js/theme.js"></script>
</body>

</html>
