<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Logístico - Spitech</title>
    <script>if(localStorage.theme==='dark'||(!('theme' in localStorage)&&window.matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.classList.add('dark')}</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            height: 100vh;
            overflow: hidden;
            margin: 0;
            background: #f3f4f6;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #sidebar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 340px;
            background: white;
            z-index: 20;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
        }

        .sidebar-closed {
            transform: translateX(-100%);
        }

        #toggle-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 30;
        }

        .item {
            padding: 15px;
            border-bottom: 1px solid #f3f4f6;
            cursor: pointer;
            transition: 0.2s;
        }

        .item:hover {
            background: #f0f9ff;
            border-left: 4px solid #2563eb;
        }

        .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .bg-norte {
            background: #dcfce7;
            color: #166534;
        }

        .bg-sur {
            background: #fee2e2;
            color: #991b1b;
        }

        .bg-este {
            background: #ffedd5;
            color: #9a3412;
        }

        .bg-centro {
            background: #dbeafe;
            color: #1e40af;
        }
    </style>
</head>

<body>

    <button id="toggle-btn" onclick="toggleSidebar()"
        class="bg-white dark:bg-slate-800 text-gray-800 dark:text-slate-50 p-3 rounded-full shadow-lg hover:bg-gray-100 dark:bg-slate-700 transition border border-gray-200 dark:border-slate-700">
        <svg id="icon-menu" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
        <svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
    </button>

    <div id="sidebar">
        <div class="p-5 bg-gray-900 text-white shadow-md pt-16">
            <h2 class="font-bold text-xl flex items-center gap-2">📡 Rutas (Hoy)</h2>
            <div class="mt-3">
                <input type="text" id="buscador" onkeyup="filtrarLista()" placeholder="🔍 Buscar por número..."
                    class="w-full p-2 rounded text-black text-sm">
            </div>
            <div class="flex justify-between items-center mt-3 text-xs text-gray-400">
                <span id="contador">0 pendientes</span>
                <button onclick="cargarPedidos()" class="text-blue-400 hover:text-white transition">🔄
                    Actualizar</button>
            </div>
        </div>
        <div id="lista" class="flex-1 overflow-y-auto bg-gray-50">
            <div class="flex flex-col items-center justify-center h-40 text-gray-400">
                <p>Cargando mapa...</p>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/mapa-app.js"></script>
    <script src="../js/theme.js"></script>
</body>

</html>
