<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedidos - Soluciones Colibrí</title>
    <script>if(localStorage.theme==='dark'||(!('theme' in localStorage)&&window.matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.classList.add('dark')}</script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuentes de Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

                    colors: {
                        mainBgTop: '#f8fafc',
                        mainBgBottom: '#f1f5f9',

                        brandGray: '#334155',

</head>

<body class="bg-gray-50 dark:bg-slate-900 font-sans text-gray-800 dark:text-slate-50 overflow-hidden relative flex h-screen">

    </div>

    <!-- SIDEBAR LATERAL -->

        class="w-64 bg-sidebarBg flex flex-col text-white flex-shrink-0 transition-transform duration-300 ease-in-out fixed inset-y-0 left-0 z-50 transform -translate-x-full md:relative md:translate-x-0 shadow-2xl md:shadow-none">
        
        <div class="h-20 flex items-center justify-between px-6 border-b border-sidebarHover">
            <div class="flex items-center">
                <svg class="h-8 w-10 mr-3" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M45 55 L35 15 L60 40 Z" fill="#fdba74" />

                    <path d="M60 40 L85 30 L65 50 Z" fill="#4b5563" />

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                </svg>
                <span class="font-medium whitespace-nowrap">Pedidos</span>
            </a>

            <a href="#"
                class="flex items-center px-4 py-3 text-gray-300 hover:bg-sidebarHover hover:text-white rounded-lg transition-colors">
                <svg class="w-5 h-5 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

            </a>
            <a href="#"

                </svg>
                <span class="font-medium whitespace-nowrap">Configuración</span>
            </a>

        <div class="p-4 border-t border-sidebarHover w-full shrink-0">

                <svg class="w-5 h-5 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">

        <!-- Header Superior -->
        <header class="h-20 bg-sidebarBg/95 backdrop-blur-md border-b border-sidebarHover shadow-[0_4px_20px_-10px_rgba(0,0,0,0.3)] flex items-center justify-between px-4 sm:px-8 z-10 shrink-0">
            <div class="flex items-center gap-3">
                <button id="open-sidebar" class="md:hidden text-gray-400 hover:text-white focus:outline-none p-2 rounded-md transition-colors">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <h1 class="text-xl sm:text-2xl font-semibold text-white">PEDIDOS</h1>
            </div>

            <!-- Profile Area -->
            <div class="flex items-center gap-4 sm:gap-6">
                
                <button class="relative text-gray-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>

                </button>
                
                <div class="flex items-center gap-3 border-l pl-4 sm:pl-6 border-sidebarHover cursor-pointer group">
                    <div class="w-9 h-9 sm:w-10 sm:h-10 rounded-full bg-brandPrimary flex items-center justify-center text-white font-bold shadow-md group-hover:bg-brandPrimaryHover transition-colors shrink-0 ring-2 ring-sidebarBg">
                        L
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <div class="flex-1 overflow-y-auto p-4 sm:p-8">
            <div class="max-w-6xl mx-auto space-y-6">
                
                <!-- Tabla general envuelta en misma clase del dashboard -->
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm overflow-hidden mb-8 flex flex-col min-h-[500px]">
                    
                    <!-- 1. Cabecera Principal de la Tarjeta -->
                    <div class="px-6 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center py-5 sm:px-6">
                        <h3 class="text-xl font-semibold text-gray-800 dark:text-slate-50 tracking-wide">MIS PEDIDOS</h3>
                        <button class="bg-brandGray hover:bg-brandGrayOutline text-white px-5 py-2.5 rounded-lg text-sm font-medium transition-colors shadow-sm whitespace-nowrap">
                            Nuevo Pedido
                        </button>
                    </div>

                    <!-- 2. Filtros de Búsqueda (Caja separada visualmente) -->
                    <div class="bg-gray-50/70 border-b border-gray-200 dark:border-slate-700 px-6 py-4">
                        <div class="flex flex-col md:flex-row gap-3">
                            
                            <!-- Buscador General -->
                            <div class="relative flex-1">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                </span>
                                <input type="text" class="w-full pl-10 pr-3 py-2 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-brandPrimary focus:border-brandPrimary transition-colors shadow-sm" placeholder="Buscar por ID, Cliente o Destino...">
                            </div>

                            <!-- Filtro: Agencia / Envío -->
                            <div class="w-full md:w-48">
                                <select class="w-full px-3 py-2 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-brandPrimary focus:border-brandPrimary text-gray-600 dark:text-slate-300 shadow-sm cursor-pointer">
                                    <option value="">Tipo Envío (Todos)</option>
                                    <option value="shalom">Agencia Shalom</option>
                                    <option value="olva">Olva Courier</option>
                                    <option value="dinsides">Agencia Dinsides</option>
                                    <option value="marvisur">Marvisur</option>
                                    <option value="delivery">Delivery Express</option>
                                    <option value="retiro">Retiro en Tienda</option>
                                </select>
                            </div>

                            <!-- Filtro: Estado -->
                            <div class="w-full md:w-40">
                                <select class="w-full px-3 py-2 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-brandPrimary focus:border-brandPrimary text-gray-600 dark:text-slate-300 shadow-sm cursor-pointer">
                                    <option value="">Estado (Todos)</option>
                                    <option value="pedido">Pedido</option>
                                    <option value="registrado">Registrado</option>
                                    <option value="enviado">Enviado</option>
                                </select>
                            </div>

                            <!-- Rango de Días -->
                            <div class="w-full md:w-auto flex items-center gap-2">
                                <input type="date" class="w-full px-3 py-2 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-brandPrimary focus:border-brandPrimary text-gray-500 dark:text-slate-400 shadow-sm cursor-text" title="Desde">
                                <span class="text-gray-400 text-sm">-</span>
                                <input type="date" class="w-full px-3 py-2 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-brandPrimary focus:border-brandPrimary text-gray-500 dark:text-slate-400 shadow-sm cursor-text" title="Hasta">
                            </div>

                        </div>
                    </div>

                    <!-- 3. Contenedor Tabla de Datos (Estilo Dashboard) -->
                    <div class="overflow-x-auto w-full flex-1">
                        <table class="w-full text-left border-collapse min-w-[900px]">
                            <thead>
                                <tr class="bg-gray-50/50 dark:bg-slate-800/50 text-xs uppercase tracking-wider text-gray-500 dark:text-slate-400">
                                    <th class="px-6 py-4 font-medium w-24">ID Pedido</th>
                                    <th class="px-6 py-4 font-medium w-48">Cliente</th>
                                    <th class="px-6 py-4 font-medium w-32">Fecha</th>
                                    <th class="px-6 py-4 font-medium w-48">Agencia / Envío</th>
                                    <th class="px-6 py-4 font-medium w-32">Teléfono</th>
                                    <th class="px-6 py-4 font-medium">Dirección / Destino</th>
                                    <th class="px-6 py-4 font-medium w-32 text-center">Estado</th>
                                </tr>
                            </thead>
                            <tbody id="pedidos-tbody" class="divide-y divide-gray-100 dark:divide-slate-700 text-sm">
                                <!-- SKELETON LOADER (5 filas) -->
                                <tr class="animate-pulse">
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-16"></div></td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center">
                                            <div class="h-8 w-8 rounded-full bg-gray-200 mr-3"></div>
                                            <div class="h-4 bg-gray-200 rounded w-32"></div>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-20"></div></td>
                                    <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-md w-24"></div></td>
                                    <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-full w-24"></div></td>
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-48"></div></td>
                                    <td class="px-6 py-4 text-center"><div class="h-6 bg-gray-200 rounded-full w-20 mx-auto"></div></td>
                                </tr>
                                <tr class="animate-pulse">
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-16"></div></td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center">
                                            <div class="h-8 w-8 rounded-full bg-gray-200 mr-3"></div>
                                            <div class="h-4 bg-gray-200 rounded w-32"></div>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-20"></div></td>
                                    <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-md w-24"></div></td>
                                    <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-full w-24"></div></td>
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-48"></div></td>
                                    <td class="px-6 py-4 text-center"><div class="h-6 bg-gray-200 rounded-full w-20 mx-auto"></div></td>
                                </tr>
                                <tr class="animate-pulse">
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-16"></div></td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center">
                                            <div class="h-8 w-8 rounded-full bg-gray-200 mr-3"></div>
                                            <div class="h-4 bg-gray-200 rounded w-32"></div>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-20"></div></td>
                                    <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-md w-24"></div></td>
                                    <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-full w-24"></div></td>
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-48"></div></td>
                                    <td class="px-6 py-4 text-center"><div class="h-6 bg-gray-200 rounded-full w-20 mx-auto"></div></td>
                                </tr>
                                <tr class="animate-pulse">
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-16"></div></td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center">
                                            <div class="h-8 w-8 rounded-full bg-gray-200 mr-3"></div>
                                            <div class="h-4 bg-gray-200 rounded w-32"></div>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-20"></div></td>
                                    <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-md w-24"></div></td>
                                    <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-full w-24"></div></td>
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-48"></div></td>
                                    <td class="px-6 py-4 text-center"><div class="h-6 bg-gray-200 rounded-full w-20 mx-auto"></div></td>
                                </tr>
                                <tr class="animate-pulse">
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-16"></div></td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center">
                                            <div class="h-8 w-8 rounded-full bg-gray-200 mr-3"></div>
                                            <div class="h-4 bg-gray-200 rounded w-32"></div>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-20"></div></td>
                                    <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-md w-24"></div></td>
                                    <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-full w-24"></div></td>
                                    <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-48"></div></td>
                                    <td class="px-6 py-4 text-center"><div class="h-6 bg-gray-200 rounded-full w-20 mx-auto"></div></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- SCRIPTS PARA RESPONSIVE Y BLUR (Barra Sandwich) -->
    <script src="../dashboard/js/sidebar.js"></script>
    <script src="../dashboard/js/auth.js" type="module"></script>
    <script src="js/getPedidos.js" type="module"></script>
    <script src="../js/theme.js"></script>
</body>

</html>
